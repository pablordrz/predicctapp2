services:
  vaticina:
    build: .
    container_name: vaticina
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=cambia-este-secreto-en-produccion
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - DB_PATH=/app/data/vaticina.db
    volumes:
      - vaticina_data:/app/data
    restart: unless-stopped

volumes:
  vaticina_data:
